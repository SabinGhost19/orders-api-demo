# Reusable job: build & push one service image. Parameterized by service so the
# orchestrator calls it twice (api + worker). Emits the normalized image repo and
# the pushed digest for downstream jobs.
name: job-build-push

on:
  workflow_call:
    inputs:
      registry:
        description: Container registry host (e.g. ghcr.io)
        required: true
        type: string
      image_owner:
        description: Registry namespace / owner
        required: true
        type: string
      image_name:
        description: Image name (without registry/owner prefix)
        required: true
        type: string
      context:
        description: Docker build context path for this service
        required: true
        type: string
    outputs:
      image_repo:
        value: ${{ jobs.build-push.outputs.image_repo }}
      image_digest:
        value: ${{ jobs.build-push.outputs.image_digest }}

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.imagevars.outputs.image_repo }}
      image_digest: ${{ steps.build-and-push.outputs.digest }}
    steps:
      - name: Harden the runner (StepSecurity)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@v5
      - name: Normalize image repository name
        id: imagevars
        shell: bash
        env:
          REGISTRY: ${{ inputs.registry }}
          IMAGE_OWNER: ${{ inputs.image_owner }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: echo "image_repo=${REGISTRY}/${IMAGE_OWNER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ steps.imagevars.outputs.image_repo }}:sha-${{ github.sha }}
