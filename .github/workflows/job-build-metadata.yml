# Reusable job: build metadata (lint surrogate) for both services.
# Compiles api + worker (py_compile) and uploads the lint JSON artifacts
# (vbbi-lint-api / vbbi-lint-worker) consumed later by the VBBI attestation.
# Real unit tests live in job-unit-tests.yml.
name: job-build-metadata

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  build-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (StepSecurity)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@v5
      - name: Smoke build (api)
        working-directory: services/api
        run: |
          python -m py_compile main.py
          printf '{"exit_code":0,"linter":"py_compile","violation_count":0,"service":"api"}' > /tmp/lint-api.json
      - name: Smoke build (worker)
        working-directory: services/worker
        run: |
          python -m py_compile main.py
          printf '{"exit_code":0,"linter":"py_compile","violation_count":0,"service":"worker"}' > /tmp/lint-worker.json
      - uses: actions/upload-artifact@v5
        with: { name: vbbi-lint-api, path: /tmp/lint-api.json }
      - uses: actions/upload-artifact@v5
        with: { name: vbbi-lint-worker, path: /tmp/lint-worker.json }
