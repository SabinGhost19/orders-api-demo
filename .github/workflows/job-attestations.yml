# Reusable job: attestations for one service (parameterized by service).
# Generates+signs (cosign keyless) an SPDX SBOM, an OpenVEX predicate, a VBBI
# voucher and a custom ZTA policy attestation, then verifies the SBOM.
#
# IMPORTANT (keyless identity): cosign runs INSIDE this reusable workflow, so the
# Fulcio certificate SAN is this file's path. The cluster consumer (zta-operator)
# must trust: .../.github/workflows/job-attestations.yml@refs/heads/main
name: job-attestations

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      image_repo:
        required: true
        type: string
      image_digest:
        required: true
        type: string
      service:
        description: Service name (api | worker)
        required: true
        type: string
      manifests_repo:
        required: true
        type: string
      manifests_ref:
        required: true
        type: string
      manifests_subpath:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  attestations:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ inputs.registry }}
      IMAGE_REPO: ${{ inputs.image_repo }}
      IMAGE_DIGEST: ${{ inputs.image_digest }}
      SERVICE: ${{ inputs.service }}
      MANIFESTS_REPO: ${{ inputs.manifests_repo }}
      MANIFESTS_REF: ${{ inputs.manifests_ref }}
      MANIFESTS_SUBPATH: ${{ inputs.manifests_subpath }}
      MANIFESTS_CHECKOUT_PATH: manifests-source
    steps:
      - name: Harden the runner (StepSecurity)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: ${{ env.MANIFESTS_REPO }}
          ref: ${{ env.MANIFESTS_REF }}
          path: ${{ env.MANIFESTS_CHECKOUT_PATH }}
          token: ${{ secrets.MANIFESTS_REPO_TOKEN }}
      - uses: sigstore/cosign-installer@v3.7.0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action/download-syft@v0
      - uses: actions/download-artifact@v5
        with:
          path: /tmp/vbbi
          pattern: vbbi-*-${{ inputs.service }}
          merge-multiple: true
      # repo-wide reports, shared by api+worker.
      - uses: actions/download-artifact@v5
        with:
          name: secscan-raw
          path: /tmp/secscan
      - name: Generate and attest SBOM
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          syft "$IMAGE_REF" -o spdx-json > sbom.spdx.json
          if [ ! -s sbom.spdx.json ] || ! jq -e '.SPDXID' sbom.spdx.json >/dev/null; then
            echo "FATAL: empty/invalid SBOM" >&2; head -c 512 sbom.spdx.json >&2; exit 1
          fi
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$IMAGE_REF"
          sleep 5
      - name: Attest OpenVEX
        if: ${{ hashFiles('vex.json') != '' }}
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          cosign attest --yes --predicate vex.json --type "https://openvex.dev/ns/v0.2.0" "$IMAGE_REF"
      - name: Prepare VBBI step spec
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          printf '{"exit_code":0,"image_ref":"%s","digest":"%s","service":"%s"}' \
            "$IMAGE_REF" "${IMAGE_DIGEST}" "${SERVICE}" > "/tmp/vbbi/build-results-${SERVICE}.json"
          cat > "/tmp/vbbi/step-spec-${SERVICE}.json" <<STEPSPEC
          [
            {"name": "linting-${SERVICE}",     "file": "/tmp/vbbi/lint-${SERVICE}.json"},
            {"name": "unit-tests-${SERVICE}",  "file": "/tmp/vbbi/test-${SERVICE}.json"},
            {"name": "image-build-${SERVICE}", "file": "/tmp/vbbi/build-results-${SERVICE}.json"},
            {"name": "vuln-scan-${SERVICE}",   "file": "/tmp/vbbi/scan-${SERVICE}.json"}
          ]
          STEPSPEC
      - id: vbbi
        uses: SabinGhost19/Voucher-Based-Build-Integrity-Action@1.0
        with:
          image: ${{ inputs.image_repo }}@${{ inputs.image_digest }}
          commit-sha: ${{ github.sha }}
          step-spec-path: /tmp/vbbi/step-spec-${{ inputs.service }}.json
          hmac-key: ${{ secrets.VBBI_HMAC_KEY || 'dev-only-vbbi-key' }}
          slsa-level: "3"
      - uses: SabinGhost19/policyAttestor-action@main
        with:
          image: ${{ inputs.image_repo }}@${{ inputs.image_digest }}
          policy-path: ./security-policy.yaml
          manifest-dir: ./${{ env.MANIFESTS_CHECKOUT_PATH }}/${{ env.MANIFESTS_SUBPATH }}/${{ inputs.service }}
          attestation-type: https://devsecops.licenta.ro/attestations/custom-zta-policy/v1
      # sign security-scan/v1 for this service's image (findings are repo-wide).
      - id: secscan
        uses: SabinGhost19/security-scan-attestorAction@v1.0.1
        with:
          image: ${{ inputs.image_repo }}@${{ inputs.image_digest }}
          commit-sha: ${{ github.sha }}
          service: ${{ inputs.service }}
          gitleaks-report: /tmp/secscan/gitleaks.json
          semgrep-sarif: /tmp/secscan/semgrep.sarif
          checkov-sarif: /tmp/secscan/checkov.sarif
      - name: Verify SBOM with retry on Rekor lag
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/job-attestations.yml@refs/heads/main"
          set +e
          for attempt in 1 2 3 4 5; do
            cosign verify-attestation "$IMAGE_REF" --type spdxjson \
              --certificate-identity "$IDENTITY" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              >/tmp/sbom.jsonl 2>/tmp/sbom.err && break
            echo "SBOM verify attempt $attempt failed; retrying" >&2
            sleep $((attempt * 5))
          done
          set -e
          test -s /tmp/sbom.jsonl
      - name: Verify security-scan attestation
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/job-attestations.yml@refs/heads/main"
          cosign verify-attestation "$IMAGE_REF" \
            --type "https://devsecops.licenta.ro/attestations/security-scan/v1" \
            --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            >/tmp/secscan.jsonl
          GATING=$(jq -r '.payload' /tmp/secscan.jsonl | head -n1 | base64 -d | jq -r '.predicate.gating.result')
          [ -n "$GATING" ] && [ "$GATING" != "null" ]
